<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Discord Link Hunter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--bg2:#12151e;--bg3:#1a1e2a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.14);
  --accent:#5865F2;--accent-h:#4752c4;
  --red:#ed4245;--red-bg:rgba(237,66,69,0.1);
  --text:#e3e5eb;--muted:#7b8199;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* subtle grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(88,101,242,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,101,242,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.card{
  width:100%;max-width:400px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:40px 36px;
  position:relative;
}

/* top accent line */
.card::before{
  content:'';position:absolute;top:0;left:32px;right:32px;height:2px;
  background:var(--accent);border-radius:0 0 4px 4px;
}

.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo{
  width:42px;height:42px;background:var(--accent);border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.logo-text h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.logo-text p{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px}

.field{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;letter-spacing:0.2px}
input[type=text],input[type=password]{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:11px 14px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;
  transition:border 0.15s,background 0.15s;
}
input:focus{border-color:rgba(88,101,242,0.55);background:#1e2332}

.btn-login{
  width:100%;padding:12px;margin-top:8px;
  background:var(--accent);color:#fff;
  border:none;border-radius:9px;
  font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;transition:all 0.15s;letter-spacing:-0.1px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{background:var(--accent-h)}
.btn-login:active{transform:scale(0.98)}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.error-box{
  background:var(--red-bg);border:1px solid rgba(237,66,69,0.25);
  border-radius:8px;padding:10px 13px;
  font-size:12.5px;color:var(--red);
  margin-bottom:14px;display:none;
  line-height:1.5;
}

.spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

.footer-note{
  margin-top:24px;text-align:center;font-size:11.5px;color:var(--muted);
  font-family:var(--mono);line-height:1.6;
}

/* shake animation for wrong password */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake{animation:shake 0.4s ease}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo-row">
    <div class="logo">🎯</div>
    <div class="logo-text">
      <h1>Discord Link Hunter</h1>
      <p>sign in to continue</p>
    </div>
  </div>

  <div class="error-box" id="err-box"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="your username" autocomplete="username" autofocus>
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">
    <span id="btn-label">Sign In</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="footer-note">
    Authorized users only.<br>Contact the admin for access.
  </div>
</div>

<script>
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('err-box');
  const spinner = document.getElementById('spinner');
  const label = document.getElementById('btn-label');

  if (!username || !password) {
    showError('Please enter your username and password.');
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Signing in…';
  errBox.style.display = 'none';

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      label.textContent = '✓ Welcome';
      setTimeout(() => window.location.href = '/', 400);
    } else {
      showError(data.error || 'Login failed. Try again.');
      document.getElementById('card').classList.add('shake');
      setTimeout(() => document.getElementById('card').classList.remove('shake'), 500);
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (e) {
    showError('Network error. Is the server running?');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Sign In';
  }
}

function showError(msg) {
  const box = document.getElementById('err-box');
  box.textContent = msg;
  box.style.display = 'block';
}
</script>
</body>
</html>
